name: Widget Visibility Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      partners:
        description: 'JSON-массив партнёров для тестирования'
        required: false
        type: string
        default: ''

jobs:
  # Chrome + Edge на Ubuntu
  test-chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [Chrome, Edge]

    env:
      CI: true
      PARTNERS: ${{ github.event.inputs.partners != '' && github.event.inputs.partners || '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chrome msedge

    - name: Run tests
      run: npx playwright test --project=${{ matrix.project }}

    - name: Upload HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.project }}
        path: playwright-report/
        retention-days: 7

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.project }}
        path: test-results/
        retention-days: 7

  # Safari + Mobile Safari на macOS
  test-safari:
    runs-on: macos-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [Safari, 'Mobile Safari']

    env:
      CI: true
      PARTNERS: ${{ github.event.inputs.partners != '' && github.event.inputs.partners || '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps safari

    - name: Run Safari tests
      run: npx playwright test --project=${{ matrix.project }}

    - name: Upload HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.project }}
        path: playwright-report/
        retention-days: 7

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.project }}
        path: test-results/
        retention-days: 7

  # Mobile Chrome на Ubuntu
  test-mobile-chrome:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      PARTNERS: ${{ github.event.inputs.partners != '' && github.event.inputs.partners || '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-mobile-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-mobile-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Mobile Chrome tests
      run: npx playwright test --project='Mobile Chrome'

    - name: Upload HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-Mobile-Chrome
        path: playwright-report/
        retention-days: 7

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-Mobile-Chrome
        path: test-results/
        retention-days: 7
